<div class="inline-drawer" id="wwt-settings-root">
    <div class="inline-drawer-toggle inline-drawer-header">
        <b>Weyland Waiting Tips</b>
        <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
    </div>
    <div class="inline-drawer-content">
        <label class="checkbox_label" for="wwt-enabled" title="Show tips while waiting for a response">
            <input id="wwt-enabled" type="checkbox">
            <span>Show waiting tips</span>
        </label>
        <label class="wwt-settings-row" for="wwt-auto-advance-seconds" title="How long each tip stays visible before auto-advancing">
            <span>Auto-advance interval (seconds)</span>
            <input id="wwt-auto-advance-seconds" type="number" class="text_pole widthUnset" min="5" max="300" step="1">
        </label>
        <p class="wwt-settings-hint">
            Tips appear after you send a message and disappear when the reply arrives.
            Closing the tip panel turns this off until you re-enable it here.
        </p>
    </div>
</div>
