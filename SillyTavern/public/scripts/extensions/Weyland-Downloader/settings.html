<div class="weyland_downloader_container">
    <div class="weyland_downloader_settings">
        <div class="inline-drawer">
            <div class="inline-drawer-toggle inline-drawer-header">
                <b data-i18n="Weyland Downloader">Weyland Downloader</b>
                <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
            </div>

            <div class="inline-drawer-content">
                <div style="display: flex; gap: 5px; width: 100%; margin-top: 5px;">
                    <label class="button_label" for="weylandOpenDownloader" title="Open Character Downloader"
                        data-i18n="[title]Open Character Downloader" style="flex: 1; margin: 0;">
                        <input id="weylandOpenDownloader" type="button" class="menu_button"
                            value="Open Character Downloader" style="width: 100%;" />
                    </label>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-top: 5px;">
                    <label class="checkbox_label" for="weylandDownloadAuto" title="Auto Update Characters"
                        data-i18n="[title]Auto Update Characters">
                        <input id="weylandDownloadAuto" type="checkbox">
                        <span data-i18n="Auto-Update">Auto-Update</span>
                    </label>

                    <label class="checkbox_label" for="weylandDownloadDebug" title="Debug Weyland Downloader"
                        data-i18n="[title]Debug Weyland Downloader">
                        <input id="weylandDownloadDebug" type="checkbox">
                        <span data-i18n="Debug">Debug</span>
                    </label>
                </div>
            </div>
        </div>
    </div>
</div>
